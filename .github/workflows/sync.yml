name: Sync Telegraph Content

on:
  schedule:
    - cron: '0 * * * *' # Скрипт будет проверять Telegraph каждый час
  workflow_dispatch: # Кнопка для запуска вручную, если обновил статью и нужно срочно перенести

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Обновили с v3 до v4
      
      - name: Set up Python
        uses: actions/setup-python@v5 # Обновили с v4 до v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run sync script
        run: python sync.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update content from Telegraph" && git push)
